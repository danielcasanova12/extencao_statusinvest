<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background: #0f172a; color: #e5e7eb; }
      html, body { min-width: 360px; }
      .panel { width: 420px; max-width: 420px; max-height: 600px; display:flex; flex-direction:column; border:1px solid #1f2937; box-sizing: border-box; }
      .header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:#111827; border-bottom:1px solid #1f2937; }
      .title { font-weight:700; font-size:14px; }
      .body { padding:10px 12px; overflow-y:auto; overflow-x:hidden; max-height:520px; }
      /* search removed */
      .section-title { font-size:12px; color:#94a3b8; margin:10px 0 6px 2px; }
      .card { background:#111827; border:1px solid #1f2937; border-radius:10px; padding:10px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
      .item { display:flex; align-items:center; gap:10px; }
      .avatar { width:26px; height:26px; border-radius:6px; background:#0b1220; border:1px solid #334155; display:flex; align-items:center; justify-content:center; font-size:12px; color:#94a3b8; }
      .name { font-weight:600; color:#f3f4f6; font-size:13px; }
      .sub { font-size:12px; color:#9ca3af; }
      .row-actions { display:flex; gap:6px; }
      .btn { border:1px solid #334155; background:#1f2937; color:#e5e7eb; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; }
      .btn.danger { background:#7f1d1d; border-color:#ef4444; }
      .btn[disabled] { opacity: .5; cursor: not-allowed; }
      .footer { display:flex; align-items:center; justify-content:space-around; padding:8px; border-top:1px solid #1f2937; background:#0b1220; }
      .tab { background:transparent; border:1px solid transparent; color:#9ca3af; padding:6px 8px; border-radius:8px; cursor:pointer; font-size:12px; }
      .tab.active { color:#e5e7eb; background:#111827; border-color:#1f2937; }
      a { color: #93c5fd; text-decoration: none; }
      label { display:block; font-size:12px; color:#cbd5e1; margin-bottom:6px; }
      input[type="file"] { width:100%; background:#0b1220; color:#f3f4f6; border:1px solid #334155; border-radius:10px; padding:8px; font-size:12px; }
      .row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-top:8px; }
      select { padding:8px 10px; border:1px solid #334155; background:#0b1220; color:#f3f4f6; border-radius:10px; font-size:12px; flex:1 1 180px; min-width:160px; }
      .row .btn { flex: 0 0 auto; }
      .row > label { display:inline; margin:0; white-space:nowrap; }
      .row > label { display:inline; margin:0; white-space:nowrap; }
      .list { margin-top:8px; display:flex; flex-direction:column; gap:6px; }
      .list-item { display:flex; align-items:center; justify-content:space-between; background:#111827; border:1px solid #1f2937; border-radius:10px; padding:8px 10px; }
      .list-main { display:flex; align-items:center; gap:8px; }
      .list-name { font-size:13px; color:#f3f4f6; }
      .list-meta { font-size:11px; color:#9ca3af; }
      .list-actions { display:flex; gap:6px; }
      .icon-btn { border:1px solid #334155; background:#1f2937; color:#e5e7eb; border-radius:8px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
      /* Progress */
      .progress { display:none; height:8px; background:#111827; border:1px solid #334155; border-radius:8px; overflow:hidden; margin-top:6px; }
      .progress .bar { height:100%; width:0%; background:#10b981; transition: width .2s ease; }
      .progress-text { font-size:12px; color:#94a3b8; margin-top:4px; }
      .progress-info { font-size:12px; color:#cbd5e1; margin-top:2px; }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="header"><div class="title">Painel</div></div>
      <div class="body">
        <div class="section">
          <div class="section-title">Ações rápidas</div>
          <div class="card">
            <div class="item">
              <div class="avatar">API</div>
              <div>
                <div class="name">Testar API</div>
                <div class="sub">Consulta /api/fm-last-updated</div>
              </div>
            </div>
            <div class="row-actions">
              <button class="btn" id="btnPing">Ping</button>
            </div>
          </div>
          <div id="log" class="sub"></div>
        </div>

        <div class="section" id="csvSection">
          <div class="section-title">Importar CSV</div>
          <!-- 1) Abrir e ir ao download -->
          <div class="row">
            <button class="btn" id="btnDownloadAuto">Abrir página e ir ao Download</button>
          </div>
          <!-- 2) Escolher arquivo -->
          <label for="fileInput" style="margin-top:8px;">Selecione um arquivo CSV</label>
          <input type="file" id="fileInput" accept=".csv" />
          <!-- 3) Upload do arquivo escolhido -->
          <div class="row" style="margin-top:8px;">
            <button class="btn" id="btnUploadFile" disabled>Upload</button>
          </div>
          <div id="fileName" class="sub" style="margin-top:6px;"></div>
          <div class="row">
            <label for="execucaoTipo">Tipo de Execução:</label>
            <select id="execucaoTipo">
              <option value="formulamagica">Fórmula Mágica</option>
              <option value="inv10">Investidor10</option>
              <option value="inv10fm">Inv10 ≥6 + FM</option>
              <option value="todos">Todos</option>
            </select>
            <button class="btn" id="btnExecutar">Executar</button>
            <button class="btn danger" id="btnCancelar" title="Cancelar execução">Cancelar</button>
          </div>
          <div id="statusArea" class="sub" aria-live="polite" style="margin-top:6px;"></div>
          <div id="progress" class="progress" aria-hidden="true"><div id="progressBar" class="bar"></div></div>
          <div id="progressText" class="progress-text"></div>
          </div>
          
          <div id="progressInfo" class="progress-info"></div>
        </div>

        <div class="section" id="savedSection">
          <div class="section-title">Arquivos salvos</div>
          <div id="savedList" class="list"></div>
        </div>

        <div class="section" id="historySection">
          <div class="section-title">Histórico de execuções (INV10)</div>
          <div class="row">
            <button class="btn danger" id="btnClearHistory" title="Limpar histórico">Limpar histórico</button>
          </div>
          <div id="jobHistory" class="list"></div>
        </div>
      </div>
      <div class="footer">
        <!-- <button class="tab active">Menu</button> -->
        <a class="tab" href="https://statusinvest.com.br/carteira/patrimonio" target="_blank" rel="noreferrer">Carteira StatusInvest</a>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
